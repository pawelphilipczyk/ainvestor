name: Deploy PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to deploy to the preview app
        required: true
        default: main
        type: string

concurrency:
  group: deploy-preview
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  preview:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: https://ainvestor-preview.fly.dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1.4

      - name: Create preview app if needed
        run: flyctl apps create ainvestor-preview || true

      - name: Deploy to preview app
        run: flyctl deploy --remote-only --config fly.preview.toml
