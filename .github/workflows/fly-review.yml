name: Deploy PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: deploy-preview
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  preview:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: https://ainvestor-preview.fly.dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1.4

      - name: Create preview app if needed
        run: flyctl apps create ainvestor-preview || true

      - name: Deploy to preview app
        run: flyctl deploy --remote-only --config fly.preview.toml
