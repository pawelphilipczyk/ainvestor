# Single preview app — stable URL for OAuth callback
# Deploys the latest PR branch; only one PR preview at a time
app = "ainvestor-preview"
primary_region = "fra"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
  method = "get"
  path = "/health"
