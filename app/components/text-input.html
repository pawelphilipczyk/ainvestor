<div>
  <label for="{{ id }}" class="mb-1 block text-sm font-semibold text-slate-700">{{ label }}</label>
  <input
    id="{{ id }}"
    name="{{ field_name }}"
    type="text"
    required
    placeholder="{{ placeholder }}"
    autocomplete="off"
    class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500"
  />
</div>
