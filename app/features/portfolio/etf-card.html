<li class="flex items-center justify-between gap-3 rounded-md border border-border bg-card px-4 py-3">
  <strong class="font-semibold text-card-foreground">{{ name }}</strong>
  <div class="flex items-center gap-3">
    {{ badge }}
    <button
      type="button"
      class="etf-remove-trigger rounded-md px-2 py-1 text-xs text-muted-foreground transition-colors hover:bg-destructive/10 hover:text-destructive"
      aria-label="Remove {{ name }} from portfolio"
      data-dialog-id="{{ dialog_id }}"
    >
      Sell
    </button>
  </div>
  <dialog id="{{ dialog_id }}" class="rounded-lg border border-border bg-card p-4 shadow-lg backdrop:bg-black/50">
    <p class="mb-4 text-sm text-card-foreground">Remove <strong>{{ name }}</strong> from your portfolio?</p>
    <div class="flex justify-end gap-2">
      <form method="dialog">
        <button
          type="submit"
          class="rounded-md border border-border bg-background px-3 py-1.5 text-sm text-card-foreground transition-colors hover:bg-accent"
        >
          Cancel
        </button>
      </form>
      <form method="post" action="{{ delete_href }}">
        <input type="hidden" name="_method" value="DELETE" />
        <button type="submit" class="rounded-md bg-destructive px-3 py-1.5 text-sm text-white hover:opacity-90">Remove</button>
      </form>
    </div>
  </dialog>
</li>
